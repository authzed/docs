---
name: "Lint"
"on":
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"
jobs:
  lint:
    name: "Lint Everything"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "bewuethr/yamllint-action@v1.3.0"
        with:
          config-file: ".yamllint"
      - uses: "pnpm/action-setup@v6"
        with:
          run_install: true
          cache: true
      - name: "Check Formatting"
        run: "pnpm run format:check"
